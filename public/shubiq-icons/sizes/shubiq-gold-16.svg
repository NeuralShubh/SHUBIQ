<svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
<rect x="0" y="0" width="16" height="16" rx="2" fill="#050508"/>
<defs>
  <radialGradient id="hubBg" cx="40%" cy="35%" r="70%">
    <stop offset="0%" stop-color="#1c1608"/>
    <stop offset="100%" stop-color="#050508"/>
  </radialGradient>
  <linearGradient id="acGrad" x1="0" y1="0" x2="16" y2="16" gradientUnits="userSpaceOnUse">
    <stop offset="0%" stop-color="#fff0a0"/>
    <stop offset="45%" stop-color="#c9a84c"/>
    <stop offset="100%" stop-color="#050508"/>
  </linearGradient>
  <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.06"/>
    <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
  </radialGradient>
</defs>
<!-- ambient glow -->
<circle cx="8" cy="8" r="7" fill="url(#bgGlow)"/>
<!-- ghost outer ring -->
<circle cx="8" cy="8" r="4" fill="none" stroke="#c9a84c" stroke-width="0.6" stroke-opacity="0.15"/>
<!-- orbit ring -->
<circle cx="8" cy="8" r="6.24" fill="none" stroke="url(#acGrad)" stroke-width="1.6"/>
<!-- spokes -->
<line x1="8" y1="8" x2="8" y2="1.76" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.55"/>
<line x1="8" y1="8" x2="13.4" y2="4.9" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.55"/>
<line x1="8" y1="8" x2="13.4" y2="11.1" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.55"/>
<line x1="8" y1="8" x2="8" y2="14.24" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.55"/>
<line x1="8" y1="8" x2="2.6" y2="11.1" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.55"/>
<line x1="8" y1="8" x2="2.6" y2="4.9" stroke="#c9a84c" stroke-width="1" stroke-opacity="0.55"/>
<!-- nodes -->
<circle cx="8" cy="1.76" r=".880" fill="#09090f" stroke="url(#acGrad)" stroke-width="1.6"/>
<circle cx="8" cy="1.76" r=".48" fill="none" stroke="#c9a84c" stroke-width="0.9" stroke-opacity="0.5"/>
<circle cx="8" cy="1.76" r=".176" fill="#fff0a0"/>
<circle cx="13.4" cy="4.9" r=".880" fill="#09090f" stroke="url(#acGrad)" stroke-width="1.6"/>
