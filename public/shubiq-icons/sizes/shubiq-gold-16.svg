<circle cx="13.4" cy="4.9" r=".176" fill="#fff0a0"/>
<circle cx="13.4" cy="11.1" r=".880" fill="#09090f" stroke="url(#acGrad)" stroke-width="1.6"/>
<circle cx="13.4" cy="11.1" r=".48" fill="none" stroke="#c9a84c" stroke-width="0.9" stroke-opacity="0.5"/>
<circle cx="13.4" cy="11.1" r=".176" fill="#c9a84c"/>
<circle cx="8" cy="14.24" r=".880" fill="#09090f" stroke="url(#acGrad)" stroke-width="1.6"/>
<circle cx="8" cy="14.24" r=".48" fill="none" stroke="#c9a84c" stroke-width="0.9" stroke-opacity="0.5"/>
<circle cx="8" cy="14.24" r=".176" fill="#c9a84c"/>
<circle cx="2.6" cy="11.1" r=".880" fill="#09090f" stroke="url(#acGrad)" stroke-width="1.6"/>
<circle cx="2.6" cy="11.1" r=".48" fill="none" stroke="#c9a84c" stroke-width="0.9" stroke-opacity="0.5"/>
<circle cx="2.6" cy="11.1" r=".176" fill="#c9a84c"/>
<circle cx="2.6" cy="4.9" r=".880" fill="#09090f" stroke="url(#acGrad)" stroke-width="1.6"/>
